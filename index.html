<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenta Osborn</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace; 
            font-size: small;
            padding: 0; 
            letter-spacing: -0.05em; 
            margin: 0; /* Added margin: 0 for better full-page control */
            line-height: 1.4; /* Adjusted line-height for readability */
        }

        #content-container {
            max-width: 500px;
            padding-left: 20px;
            padding-top: 20px;
            /* Added min-height to ensure container handles small content on large screens */
            min-height: 100vh; 
        }

        #image-and-caption-container {
            position: fixed; 
            right: 100px; 
            top: 50%; 
            transform: translateY(-50%); 
            width: 375px; 
            display: none;
            z-index: 10; /* Increased z-index to ensure it sits above content */
            pointer-events: none; /* Allows clicks to pass through when not interacting */
        }
        
        #image-and-caption-container.horizontal-display {
            width: 500px; 
        }

        @media (max-width: 768px) {
            #image-and-caption-container {
                right: auto; 
                left: 50%; 
                top: 50%; /* Ensuring it stays centered */
                transform: translate(-50%, -50%); 
                width: 70vw;
                max-width: 375px; 
                z-index: 10; 
                background-color: transparent; 
                box-shadow: none;
                padding: 0;
            }

            #image-and-caption-container.horizontal-display {
                width: 90vw; 
                max-width: 500px;
            }
        }

        #hover-image-display {
            width: 100%; 
            height: auto;
            object-fit: contain;
            display: block;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); /* Added slight shadow for visibility */
        }

        #hover-caption-display {
            text-align: left;
            margin-top: 5px; 
            padding: 5px 0; /* Adjusted padding */
            line-height: 1.2;
            width: 100%;
            font-size: smaller; /* Ensuring the caption is small */
        }

        .img-trigger {
            cursor: pointer;
            color: inherit;
            /* Underline only on hover to maintain the text aesthetic */
            text-decoration: none; 
            display: inline-block; /* Allows padding/margin for better touch target */
            padding: 0 2px;
            transition: color 0.1s;
        }

        .img-trigger:hover {
            color: #555; /* Slight color change on hover */
        }
    </style>
</head>
<body>
    <div id="content-container">
        Kenta Osborn is a multidisciplinary creative specializing in web design, graphic design, video production, and photography.
        <br>
        <br>
        Contact
        <br>
        &emsp;<a href="https://instagram.com/kentaosborn" target="_blank">Instagram</a>
        <br>
        &emsp;<a href="mailto:osbornkenta@gmail.com">Email</a>
        <br>
        <br>
        <!-- Added extra line breaks for better visual spacing at the bottom -->
        <br><br><br><br> 
    </div>

    <div id="image-and-caption-container">
        <!-- Added onerror to handle broken image URLs gracefully -->
        <img id="hover-image-display" src="" alt="Item Preview" onerror="this.src='https://placehold.co/375x500/cccccc/000000?text=Image+Load+Error';">
        <div id="hover-caption-display"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const triggers = document.querySelectorAll('.img-trigger');
            const imageCaptionContainer = document.getElementById('image-and-caption-container');
            const hoverImage = document.getElementById('hover-image-display');
            const hoverCaption = document.getElementById('hover-caption-display');
            
            let hideTimeout; 
            
            const showImage = (e, trigger) => {
                clearTimeout(hideTimeout);

                const finalUrl = trigger.getAttribute('data-src');
                const captionText = trigger.getAttribute('data-caption') || '';
                const isHorizontal = trigger.getAttribute('data-orientation') === 'horizontal'; 
                
                if (finalUrl) {
                    if (isHorizontal) {
                        imageCaptionContainer.classList.add('horizontal-display');
                    } else {
                        imageCaptionContainer.classList.remove('horizontal-display');
                    }
                    
                    hoverImage.src = finalUrl;
                    hoverCaption.textContent = '* ' + captionText; 
                    imageCaptionContainer.style.display = 'block';
                    imageCaptionContainer.style.pointerEvents = 'auto'; // Re-enable pointer events when visible
                }
            };

            const hideImage = () => {
                hideTimeout = setTimeout(() => {
                    imageCaptionContainer.style.display = 'none';
                    imageCaptionContainer.classList.remove('horizontal-display'); 
                    hoverImage.src = '';
                    imageCaptionContainer.style.pointerEvents = 'none'; // Disable pointer events when hidden
                }, 200);
            }
            
            triggers.forEach(trigger => {
                // Mouse/Hover events
                trigger.addEventListener('mouseover', (e) => showImage(e, trigger));
                trigger.addEventListener('mouseout', hideImage);
                
                // Touch events for mobile/touch devices
                trigger.addEventListener('touchstart', (e) => {
                    e.preventDefault(); 
                    // Toggling behavior for touch devices
                    if (imageCaptionContainer.style.display === 'block' && 
                        hoverImage.src.includes(trigger.getAttribute('data-src'))) {
                        hideImage(); // Hide if already showing the same image
                    } else {
                         // Otherwise, show the new image
                         clearTimeout(hideTimeout); 
                         showImage(e, trigger);
                    }
                });
            });

            // Global click handler to dismiss on mobile/touch when clicking elsewhere
            document.addEventListener('click', (e) => {
                // If the click is not on a trigger and not inside the image container, hide it
                if (!e.target.closest('.img-trigger') && !e.target.closest('#image-and-caption-container')) {
                     if (imageCaptionContainer.style.display === 'block') {
                         hideImage();
                     }
                }
            });

            // Prevent the fixed container from disappearing when the mouse moves over it
            imageCaptionContainer.addEventListener('mouseover', () => {
                clearTimeout(hideTimeout);
            });
            imageCaptionContainer.addEventListener('mouseout', hideImage);
        });
    </script>
</body>
</html>
